<script>
	gsap.registerPlugin(CSSRulePlugin);

	document.addEventListener("DOMContentLoaded", function(e){
	var path1 =  [{x:0, y:0},{x:-5, y:0},{x:-5, y:5},  {x:-5, y:5},{x:0, y:5},  {x:5, y:5},{x:5, y:5},  {x:5, y:0},{x:0, y:0}];
	// 	var path4 =  [{x:0, y:0},{x:-20, y:0},{x:-20, y:-20},  {x:-20, y:-20},{x:0, y:-20},  {x:20, y:-20},{x:20, y:-20},  {x:20, y:0},{x:0, y:0}];
	// 	var path2 =  [{x:0, y:0},{x:-5, y:0},{x:-5, y:-5},  {x:-5, y:-5},{x:0, y:-5},  {x:5, y:-5},{x:5, y:-5},  {x:5, y:0},{x:0, y:0}];
	// 	var path3 =  [{x:0, y:0},{x:10, y:0},{x:10, y:10},  {x:10, y:10},{x:0, y:10},  {x:10, y:10},{x:10, y:10},  {x:10, y:0},{x:0, y:0}];


		var tlRotation = new gsap.timeline({delay:3});
		tlRotation.add[(
			gsap.to(".bf-move", {motionPath: {path: path1}, duration:6, ease:Linear.easeNone, repeat:-1})
		)];

	// 	gsap.to(".bg", {yoyo:true, scale:1.3, rotation:10, ease:Linear.easeNone, duration:15, repeat:-1})

		var tlBalons = new gsap.timeline({repeat:-1});	
		tlBalons
		.set(".top-coner", {scale:5, transformOrigin:"left top"})
		.set(".bottom-coner", {scale:5,  transformOrigin:"right bottom"})
		.fromTo(".bf-circle", {scale:3, opacity:0}, {scale:1, opacity:1, duration:0.6, ease: "elastic.out(1,0.8)"})
		.to(".top-coner", {scale:1, opacity:1, duration:1, transformOrigin:"left top"}, "-=0.3")
		.to(".bottom-coner",{scale:1, opacity:1, duration:1, transformOrigin:"right bottom"}, "-=1")
		
		.to(".bf-circle", {scale:0.7, y:100, x:60, duration:0.6}, "-=0.6")
		.to(".bf", {duration:0.3, y:-14, opacity:0}, "-=0.3")
		.fromTo(".cta", {opacity:0},{y:-14, duration:0.3, opacity:1}, "-=0.3")
		.fromTo(".stars, #container",{opacity:0}, {opacity:1, duration:0.3}, "-=0.3")

		
		.fromTo(".copy1", {scale:2, opacity:0}, {scale:1, opacity:1, duration:0.8, ease: "elastic.out(1,0.8)"},"-=0.3")
		.to(".copy1", {scale:0.5, opacity:0, duration:0.5},"+=2")

		.to(".copy3", {scale:0.5, opacity:0, duration:0.5},"+=2")

		.to(".bottom-coner", {scale:5,  transformOrigin:"right bottom", duration:0.3}, "-=0.3")
		.to(".bf-circle", {scale:0, y:0, x:0, opacity:0, duration:0.3}, "-=0.3")
		.to(".bf", {y:0,duration:0.3}, "-=0.3")
		.to(".stars, #container",{opacity:0, duration:0.3}, "-=0.3")

		;
		

		var total = 13;
		var warp = document.getElementById("container"),	w = warp.offsetWidth; h = warp.offsetHeight;
		var eases = ['Power0.easeOut', 'Power2.easeOut', 'Power3.easeOut'];

		for (var i=0; i<total; i++){ 
			var Div = document.createElement('div');
			gsap.set(Div,{attr:{class:'dot'},rotation:R(180,360),x:180,y:200, scale:R(1,2)});
			warp.appendChild(Div);
			animm(Div);
		}
	
		function animm(elm){   
			gsap.to(elm,{rotation:0,scale:0, x:R(0, 400), y:R(0, 250),ease:Linear.easeNone,repeat:-1,delay:R(0,2), duration:R(0.5,3), ease: eases[randomInt(0, eases.length - 1)]});
			// gsap.to(elm,{scale:R(0.8,1.2), y:-h-50,ease:Linear.easeNone,repeat:-1,delay:R(0,2), duration:R(2,4)});
			// gsap.to(elm,{x:'+=100',repeat:-1,yoyo:true,ease:Sine.easeInOut, duration:R(1,4)});
			// gsap.to(elm,{rotation:0,repeat:-1, ease:Sine.easeInOut, duration:R(2,5)});
		};
	
		function R(min,max) {return min+Math.random()*(max-min)};

		function randomInt(min, max) {
  			return Math.floor(Math.random() * (max - min + 1) + min);
		}
	});
